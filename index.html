<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Surprise ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.box{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.2);
width:90%;
max-width:380px;
}

input{
width:80%;
padding:12px;
font-size:18px;
text-align:center;
border-radius:10px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:18px;
}

#content{
display:none;
animation:fade 1s;
}

img{
width:100%;
border-radius:15px;
margin-top:15px;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:fixed;
color:red;
font-size:24px;
animation:up 6s linear infinite;
}

@keyframes up{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="box">

<div id="login">
<h2>🔐 ใส่รหัสก่อนน้าา 💕</h2>

<input type="password" id="pass" placeholder="Access Code">

<br>

<button onclick="check()">เปิดเซอร์ไพรส์</button>

</div>

<div id="content">

<h2>❤️ ครบรอบ 10 เดือน ❤️</h2>

<p>
ครบรอบ10เดือนแล้วนะอ้วน ❤️<br><br>

เค้ารักเธอที่สุดในโลกกกกกก 💕<br><br>

ขอบคุณที่คอยดูแลเค้ามาตลอด<br><br>

รักนะ 💐
</p>

<img id="slide" src="IMG_1724.jpeg">

</div>

</div>

<script>

const images=[
"IMG_1724.jpeg",
"IMG_1196.jpeg",
"554F6132-1442-4A28-AB20-BB7CCA0F2E3B.png",
"IMG_9294.jpeg",
"IMG_2354.jpeg",
"IMG_0061.jpeg",
"quality_restoration_25690314103633787.jpeg"
];

let i=0;

function check(){

if(document.getElementById("pass").value=="191025"){

document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";

setInterval(()=>{

i++;

if(i>=images.length)i=0;

document.getElementById("slide").src=images[i];

},2500);

for(let j=0;j<30;j++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(h);

}

}else{

alert("รหัสไม่ถูกนะอ้วน 🤭");

}

}

</script>

</body>
</html>
